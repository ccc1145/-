# ============================================================
# 三、背景经历池
# 20 段经历：14 段始终可用 + 6 段事件门控
# ============================================================
backgrounds:
  # ---------- 始终可用（通用型，14 段）----------
  - bg_id: "apprenticeship"
    story: "少年时拜入一位严厉的师父门下学艺，起早贪黑打磨基本功，虽然师父不假辞色但教给了ta安身立命的本事。"
    personality_affinity: ["沉稳", "可靠", "务实"]
    personality_conflict: ["轻浮"]
    knowledge:
      - "修炼之事没有捷径，根基打得越扎实走得越远"
      - "有几种基本功的练法在宗门已经不传了，但师父教过"
    secrets_weighted:
      - secret: "师父当年是被宗门逐出的，但ta从不知道原因"
        weight: 25
      - secret: "没啥特别的，就是个普通的学艺经历"
        weight: 75

  - bg_id: "self_discovery"
    story: "在修炼中偶然进入一种玄妙的顿悟状态，于刹那间领会了平时苦思不得的功法奥义，修为因此精进不少。"
    personality_affinity: ["沉稳", "敏锐", "孤傲"]
    personality_conflict: ["轻浮", "暴躁"]
    knowledge:
      - "修炼中的顿悟可遇不可求，但心境澄明时更容易触发"
      - "那次顿悟让ta对功法有了自己的独到理解"
    secrets_weighted:
      - secret: "顿悟时隐约窥见了某种天地法则的碎片，但说不清楚"
        weight: 20
      - secret: "就是一次普通的修炼突破，没什么好说的"
        weight: 80

  - bg_id: "family_decline"
    story: "出身曾算殷实的家族，后因家道中落不得不提早面对世态炎凉。这段经历让ta更加坚韧不问出身只看本事。"
    personality_affinity: ["务实", "沉稳"]
    personality_conflict: ["轻浮", "质朴"]
    knowledge:
      - "修行路上灵石才是最实在的东西，面子和排场都是虚的"
      - "见过太多人情冷暖，知道锦上添花易雪中送炭难"
    secrets_weighted:
      - secret: "家族衰落背后似乎有大势力的影子，但ta查不下去"
        weight: 15
      - secret: "就是普通的家道中落，没啥隐秘"
        weight: 85

  - bg_id: "secret_favor"
    story: "曾经无意中帮了一位大人物一个忙，大人物虽然没多说什么但一直记着这份人情。ta自己都不确定哪天会用上。"
    personality_affinity: ["友善", "热心", "圆滑"]
    personality_conflict: ["孤傲", "淡漠"]
    knowledge:
      - "某些高人的脾气很怪，但知恩图报的人也不少"
      - "这份人情可以换一次不小的帮助"
    secrets_weighted:
      - secret: "那位大人物其实是被仇家追杀时被ta救下的，对方没暴露身份"
        weight: 25
      - secret: "就是帮人指了个路这种小事，对方可能早就忘了"
        weight: 75

  - bg_id: "hidden_talent"
    story: "在炼器/炼丹/符箓等某个领域有一种出人意料的天赋，哪怕修为不高也做出了让人刮目相看的作品。"
    personality_affinity: ["沉稳", "细致", "孤傲"]
    personality_conflict: ["轻浮", "暴躁"]
    knowledge:
      - "修为不是一切，手艺活需要耐心和专注"
      - "知道几种冷门的材料配比和手法诀窍"
    secrets_weighted:
      - secret: "ta的天赋来自一本意外得到的残页古法，不是自己悟的"
        weight: 20
      - secret: "就是手巧加练得多，没什么秘密"
        weight: 80

  - bg_id: "love_entanglement"
    story: "曾有一段刻骨铭心的情缘，最终因门派之别或身份之隔无疾而终。如今提起仍会微微失神。"
    personality_affinity: ["沉稳", "敏锐", "友善"]
    personality_conflict: ["暴躁", "势利"]
    knowledge:
      - "修士之情缘也逃不过现实的羁绊"
      - "知道对方所在宗门的一些情况"
    secrets_weighted:
      - secret: "那情缘其实并未真正了断，对方偶尔还会传讯"
        weight: 15
      - secret: "早就放下了，就当年轻时做了个梦"
        weight: 85

  - bg_id: "betrayal"
    story: "曾被最信任的人背叛过——或为利益或为自保。从此交心变得很难，对谁都留三分余地。"
    personality_affinity: ["多疑", "孤傲", "精明"]
    personality_conflict: ["友善", "热心"]
    knowledge:
      - "人心隔肚皮，修行路上最危险的不是妖兽而是人心"
      - "知道几种识别谎言和伪装的技巧"
    secrets_weighted:
      - secret: "背叛ta的人至今还在某个地方活得很好"
        weight: 30
      - secret: "事情已经过去了，ta不想再提"
        weight: 70

  - bg_id: "rescue"
    story: "在一次意外中不顾自身安危救了他人一命。那一战让ta受了不轻的伤，但也让ta明白了自己真正在意什么。"
    personality_affinity: ["热心", "刚直", "护短"]
    personality_conflict: ["淡漠", "怯懦"]
    knowledge:
      - "关键时刻能靠得住的人比什么都重要"
      - "知道那次意外的地点有些不对劲"
    secrets_weighted:
      - secret: "那次意外可能不是意外，是有人故意设局"
        weight: 20
      - secret: "就是碰上了妖兽突袭，救了就救了"
        weight: 80

  - bg_id: "oath_sworn"
    story: "年轻时与几位挚友立下过重誓——同生共死守望相助。如今有人已不在，有人已变了样，但誓言ta还记着。"
    personality_affinity: ["忠诚", "刚直", "可靠"]
    personality_conflict: ["圆滑", "势利"]
    knowledge:
      - "有些事比修为和利益更重要"
      - "那些故人的下落ta多少知道一些"
    secrets_weighted:
      - secret: "当年的誓言其实已经破过一次了，是ta先毁约的"
        weight: 15
      - secret: "大家都还活着，这就够了"
        weight: 85

  - bg_id: "witness_injustice"
    story: "曾亲眼目睹一件极不公平的事——强者欺压弱者、上位者草菅人命。那一刻让ta对'正道'二字有了复杂看法。"
    personality_affinity: ["刚直", "敏锐", "沉稳"]
    personality_conflict: ["圆滑", "势利"]
    knowledge:
      - "正道未必真道，邪道未必邪路"
      - "知道某些号称名门正派的修士做过什么龌龊事"
    secrets_weighted:
      - secret: "那年的事牵扯到某个大人物，ta至今不敢说出真相"
        weight: 25
      - secret: "事情已经过去了，说出来也没人信"
        weight: 75

  - bg_id: "combat_escape"
    story: "经历过一次生死一线的战斗，能从那种绝境中活着回来本身就是本事。那之后ta对危险更加敏感了。"
    personality_affinity: ["沉稳", "务实", "铁血"]
    personality_conflict: ["怯懦", "轻浮"]
    knowledge:
      - "真正的战斗不是切磋较技，是拼命"
      - "知道几种在绝境中保命的偏门手段"
    secrets_weighted:
      - secret: "那次逃生是靠了某件不该有的底牌"
        weight: 20
      - secret: "纯粹是运气好加上平时练得够狠"
        weight: 80

  - bg_id: "treasure_hunt"
    story: "曾参与过一场寻宝——或是在秘境中捡漏，或是追查一张古图。最终虽有所获但也因此惹上了麻烦。"
    personality_affinity: ["开朗", "狡黠", "慕强"]
    personality_conflict: ["怯懦", "刻板"]
    knowledge:
      - "秘境和古墓里的好东西多，但盯着的人也多"
      - "知道几处可能有宝但没人敢去的地方"
    secrets_weighted:
      - secret: "那次寻宝其实有同伴死在里面了，ta没跟任何人说"
        weight: 20
      - secret: "费了大劲只捞到点不值钱的东西，亏了"
        weight: 80

  - bg_id: "wander_years"
    story: "在被收入宗门之前，曾在九洲游历了许多年，见过形形色色的人与事，算是同辈中最有见识的那一类。"
    personality_affinity: ["开朗", "敏锐", "圆滑"]
    personality_conflict: ["怯懦", "刻板"]
    knowledge:
      - "知道中洲以外的一些风土人情和传闻"
      - "对各洲之间的路线和关卡了然于胸"
    secrets_weighted:
      - secret: "游历时在某个偏僻之地见过不该出现在那里的东西"
        weight: 15
      - secret: "就是到处走走看看，没什么特别的发现"
        weight: 85

  - bg_id: "mentor_guidance"
    story: "受过一位前辈高人的指点，虽然时间不长但对ta的修炼之路产生了深远影响。"
    personality_affinity: ["沉稳", "可靠", "热心"]
    personality_conflict: ["轻浮", "孤傲"]
    knowledge:
      - "高人的一句话可以省去几年的摸索时间"
      - "那位前辈教给ta的核心道理ta一直记着"
    secrets_weighted:
      - secret: "那位前辈其实身份见不得光，是隐姓埋名在世间行走的"
        weight: 20
      - secret: "就是一次偶然的提点，对方可能都不记得了"
        weight: 80

  # ---------- 事件门控型（6 段）----------
  - bg_id: "border_patrol"
    story: "曾随队前往天垣山脉边境巡查，亲眼见过妖兽袭村的惨状。从此对妖族深怀戒心，巡逻时总比旁人格外警惕。"
    personality_affinity: ["沉稳", "刚直", "务实"]
    personality_conflict: ["怯懦", "圆滑"]
    trigger_flags: ["border_incident_occurred"]
    knowledge:
      - "天垣山脉深处的妖兽近期活动异常频繁"
      - "边境防线有几处薄弱点"
    secrets_weighted:
      - secret: "那次巡查回来后，有几名队友莫名其妙失踪了，没人再提过"
        weight: 20
      - secret: "啥特别的也不知道，就是例行巡查"
        weight: 80

  - bg_id: "library_copyist"
    story: "曾在藏经阁抄录古籍三年，对宗门的历史典籍了如指掌。那段清苦的日子养成了沉稳坚韧的性格。"
    personality_affinity: ["沉稳", "寡言", "孤傲"]
    personality_conflict: ["开朗", "暴躁"]
    trigger_flags: ["awakening_completed"]
    knowledge:
      - "本门派建派历史中的重要人物和事件"
      - "藏经阁有几本禁书被锁在最深处"
    secrets_weighted:
      - secret: "抄录时发现一本古籍中夹着一页密信，记载了某位长老的不光彩往事"
        weight: 15
      - secret: "没什么特别的，只是见过一些不让外传的功法残篇"
        weight: 85

  - bg_id: "exchange_sect"
    story: "曾被派去其他宗门交流过一年，见识了不同流派的修行方式和理念，眼界开阔了不少。"
    personality_affinity: ["开朗", "敏锐", "可靠"]
    personality_conflict: ["孤傲", "怯懦"]
    trigger_flags: ["player_chosen_sect"]
    knowledge:
      - "了解其他宗门的修行文化和特色"
      - "认识几个其他宗门的同期弟子，偶尔还会联系"
    secrets_weighted:
      - secret: "交流期间无意间听到了某宗门内部的一些矛盾争端"
        weight: 25
      - secret: "没什么特别的，就是出去长了个见识"
        weight: 75

  - bg_id: "mission_failure"
    story: "曾执行过一次重要任务却功败垂成，虽非ta一人之过但心里始终有个坎。每每想起都会更加谨慎。"
    personality_affinity: ["沉稳", "务实", "敏锐"]
    personality_conflict: ["轻浮", "开朗"]
    trigger_flags: ["player_chosen_sect"]
    knowledge:
      - "有些任务是环环相扣的，一个环节出问题全盘皆输"
      - "知道那次失败的真正原因——有人从中作梗"
    secrets_weighted:
      - secret: "那次任务失败是因为队伍里出了内鬼，ta知道是谁但没有证据"
        weight: 30
      - secret: "就是运气不好赶上了意外，没什么阴谋"
        weight: 70

  - bg_id: "political_intrigue"
    story: "曾无意中卷入宗门或王朝的一场权谋漩涡，虽然最终脱身但深知修行路上不止有刀光剑影。"
    personality_affinity: ["狡黠", "多疑", "圆滑"]
    personality_conflict: ["友善", "诚实"]
    trigger_flags: ["player_chosen_sect"]
    knowledge:
      - "宗门的政治和王朝的权谋一样复杂"
      - "知道几个重要人物之间的明争暗斗关系"
    secrets_weighted:
      - secret: "那场权谋中ta其实被迫站了队，至今还在为那个选择付出代价"
        weight: 25
      - secret: "看到了一些不该看的，但ta装作什么都没看到"
        weight: 75

  - bg_id: "disciplinary_punishment"
    story: "因触犯门规被罚面壁半年。在寂静中反复反思，出来后人沉稳了许多，但对戒律的执行有了更深的体会。"
    personality_affinity: ["孤傲", "刚直", "沉稳"]
    personality_conflict: ["怯懦", "圆滑"]
    knowledge:
      - "宗门的戒律执行比表面宽松，有些门规其实是摆设"
    secrets_weighted:
      - secret: "面壁期间见过某位长老深夜独自出山，此后三天未归"
        weight: 25
      - secret: "真的只是在面壁，啥也不知道"
        weight: 75

