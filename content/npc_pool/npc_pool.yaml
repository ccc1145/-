# ============================================================
# 随机 NPC 成分池
# Agent 在需要生成随机 NPC 时，从各池中按规则组合抽取
# ============================================================
# 生成规则（供 Agent 参考）
generation_rules:
  pick_identity_strategy: "by_scene"
  personality_count: 3
  background_count: 1
  coherence_priority: "identity_first"

# ============================================================
# 一、身份池 — 按宗门组织
# 总计 34 个身份，宗门内部 29 个，外部 5 个
# ============================================================
identities:
  # ---------- 玄清宗（8 个）----------
  - identity_id: "xuanqing_patrol"
    sect: "xuanqing"
    name: "巡天卫"
    description: "执律殿下最强武力，修为精深纪律严明，负责宗门内外执法、巡逻守卫，平时在弟子面前出现不多，但一旦现身必有事发生。"
    realm_range:
      min: "6阶叩天门（炼虚期）"
      max: "6阶叩天门（炼虚期）"
    personality_affinity:
      preferred: ["沉稳", "刚直", "敏锐"]
      excluded: ["怯懦", "圆滑"]
  - identity_id: "xuanqing_instructor"
    sect: "xuanqing"
    name: "各院教习"
    description: "四殿八院中负责给弟子授课的教员，修为深厚学问渊博，对各自领域的术法有独到见解。"
    realm_range:
      min: "5阶观沧海（化神期）"
      max: "6阶叩天门（炼虚期）"
    personality_affinity:
      preferred: ["博学", "沉稳"]
      excluded: ["暴躁", "轻浮"]
  - identity_id: "xuanqing_elder"
    sect: "xuanqing"
    name: "宗门长老"
    description: "玄清宗地位尊崇的长老级人物，修为深不可测，掌管宗门重大事务，弟子日常不易直接接触。"
    realm_range:
      min: "5阶观沧海（化神期）"
      max: "6阶叩天门（炼虚期）"
    personality_affinity:
      preferred: ["严厉", "孤傲", "沉稳"]
      excluded: ["轻浮", "怯懦"]
  - identity_id: "xuanqing_inner_disciple"
    sect: "xuanqing"
    name: "内门弟子"
    description: "入门已久通过考核晋升内门的弟子，修为已臻元婴境以上，是外门弟子的前辈和榜样。"
    realm_range:
      min: "4阶揽月（元婴期）"
      max: "5阶观沧海（化神期）"
    personality_affinity:
      preferred: []
      excluded: []
  - identity_id: "xuanqing_outer_disciple"
    sect: "xuanqing"
    name: "外门弟子"
    description: "刚入门或尚在筑基金丹期的弟子，每日在四象台晨练、各院听课，是与玩家最频繁互动的同届群体。"
    realm_range:
      min: "筑基期"
      max: "金丹期"
    personality_affinity:
      preferred: []
      excluded: []
  - identity_id: "xuanqing_alchemist"
    sect: "xuanqing"
    name: "丹房执事"
    description: "负责在丹器院炼制与分发丹药的执事，常年与丹炉灵植打交道，性情多半沉稳务实。"
    realm_range:
      min: "4阶揽月（元婴期）"
      max: "5阶观沧海（化神期）"
    personality_affinity:
      preferred: ["沉稳", "务实"]
      excluded: ["暴躁", "轻浮"]
  - identity_id: "xuanqing_librarian"
    sect: "xuanqing"
    name: "藏经阁守书人"
    description: "看守万碑亭的守书人，终日与典籍为伴，话少但学识渊博，对宗门传承了如指掌。"
    realm_range:
      min: "4阶揽月（元婴期）"
      max: "5阶观沧海（化神期）"
    personality_affinity:
      preferred: ["寡言", "孤傲", "博学"]
      excluded: ["开朗", "圆滑"]
  - identity_id: "xuanqing_servant"
    sect: "xuanqing"
    name: "杂役弟子"
    description: "负责宗门日常杂务的低阶弟子，修为不高但消息灵通，各处奔走间能听到不少风声。"
    realm_range:
      min: "炼气期"
      max: "筑基期"
    personality_affinity:
      preferred: ["质朴", "勤恳"]
      excluded: ["孤傲", "暴躁"]

  # ---------- 神武门（7 个）----------
  - identity_id: "shenwu_captain"
    sect: "shenwu"
    name: "战队长"
    description: "五军战队长之一，修为已达叩天门境，是从无数次实战中杀出来的铁血战士。"
    realm_range:
      min: "6阶叩天门（炼虚期）"
      max: "6阶叩天门（炼虚期）"
    personality_affinity:
      preferred: ["铁血", "刚直"]
      excluded: ["怯懦", "圆滑"]
  - identity_id: "shenwu_trainer"
    sect: "shenwu"
    name: "演武教习"
    description: "在演武场上负责训练弟子的教习，实战经验丰富，对武道有近乎偏执的追求。"
    realm_range:
      min: "5阶观沧海（化神期）"
      max: "6阶叩天门（炼虚期）"
    personality_affinity:
      preferred: ["严厉", "慕强"]
      excluded: ["怯懦", "轻浮"]
  - identity_id: "shenwu_vanguard"
    sect: "shenwu"
    name: "内门战卫"
    description: "通过实战考验晋升的内门弟子，已随军参加过真正的战斗，浑身散发着战场煞气。"
    realm_range:
      min: "4阶揽月（元婴期）"
      max: "5阶观沧海（化神期）"
    personality_affinity:
      preferred: ["豪爽", "好战"]
      excluded: ["怯懦"]
  - identity_id: "shenwu_warrior"
    sect: "shenwu"
    name: "外门战徒"
    description: "刚入神武门的新兵，每日负重蛙跳千钧道、在演武场上打磨体魄，是玩家的同期战徒。"
    realm_range:
      min: "筑基期"
      max: "金丹期"
    personality_affinity:
      preferred: []
      excluded: []
  - identity_id: "shenwu_weaponsmith"
    sect: "shenwu"
    name: "锻器师"
    description: "砺锋殿中专司锻造兵器的铁匠，常年与炉火金铁为伴，性子多半暴躁但手艺一流。"
    realm_range:
      min: "4阶揽月（元婴期）"
      max: "5阶观沧海（化神期）"
    personality_affinity:
      preferred: ["暴躁", "孤傲"]
      excluded: ["友善", "圆滑"]
  - identity_id: "shenwu_logistician"
    sect: "shenwu"
    name: "后勤执事"
    description: "管理宗门物资调配的执事，精打细算务实行事，清楚每个弟子的资源配给。"
    realm_range:
      min: "4阶揽月（元婴期）"
      max: "4阶揽月（元婴期）"
    personality_affinity:
      preferred: ["务实", "精明"]
      excluded: ["暴躁"]
  - identity_id: "shenwu_veteran"
    sect: "shenwu"
    name: "伤退老兵"
    description: "因伤从前线退下的老兵，转做后勤或教学工作，身上带伤眼神沧桑，经验丰富。"
    realm_range:
      min: "金丹期"
      max: "元婴期"
    personality_affinity:
      preferred: ["沧桑", "沉稳"]
      excluded: ["轻浮", "开朗"]

  # ---------- 扶龙宫（7 个）----------
  - identity_id: "fulong_instructor"
    sect: "fulong"
    name: "宫中教习"
    description: "扶龙宫的高级教习，负责教授《皇极惊世典》基础篇及帝王术策论，礼仪周全学识深厚。"
    realm_range:
      min: "5阶观沧海（化神期）"
      max: "6阶叩天门（炼虚期）"
    personality_affinity:
      preferred: ["严谨", "沉稳"]
      excluded: ["轻浮", "暴躁"]
  - identity_id: "fulong_inner"
    sect: "fulong"
    name: "内宫弟子"
    description: "皇室宗亲或功勋子弟，身份尊贵资源最优渥，但约束也最多，言行举止代表皇室颜面。"
    realm_range:
      min: "4阶揽月（元婴期）"
      max: "5阶观沧海（化神期）"
    personality_affinity:
      preferred: []
      excluded: ["怯懦"]
  - identity_id: "fulong_outer"
    sect: "fulong"
    name: "外宫弟子"
    description: "以才能而非出身被选入扶龙宫的外姓弟子，明白自己的天花板但依然勤勉。"
    realm_range:
      min: "筑基期"
      max: "金丹期"
    personality_affinity:
      preferred: []
      excluded: ["轻浮"]
  - identity_id: "fulong_guard"
    sect: "fulong"
    name: "烛龙卫"
    description: "守卫禁地与要人的精锐侍卫，修为高深沉默寡言，对皇室绝对忠诚，不会与外人闲聊。"
    realm_range:
      min: "5阶观沧海（化神期）"
      max: "6阶叩天门（炼虚期）"
    personality_affinity:
      preferred: ["忠诚", "寡言"]
      excluded: ["开朗", "圆滑"]
  - identity_id: "fulong_scribe"
    sect: "fulong"
    name: "文书官"
    description: "宫中负责文书档案的小吏，做事细致入微，深谙宫中规矩知道什么该说什么不该说。"
    realm_range:
      min: "3阶焚野（金丹期）"
      max: "4阶揽月（元婴期）"
    personality_affinity:
      preferred: ["细致", "圆滑"]
      excluded: ["暴躁", "豪爽"]
  - identity_id: "fulong_steward"
    sect: "fulong"
    name: "膳官"
    description: "管理宫中膳食的管事，迎来送往消息灵通，从膳食用度中能感知宫中风向。"
    realm_range:
      min: "3阶焚野（金丹期）"
      max: "4阶揽月（元婴期）"
    personality_affinity:
      preferred: ["圆滑", "开朗"]
      excluded: ["孤傲", "寡言"]
  - identity_id: "fulong_ritualist"
    sect: "fulong"
    name: "礼仪执事"
    description: "专职皇室礼仪与祭祀的执事，刻板严谨一丝不苟，任何礼仪瑕疵都逃不过他的眼睛。"
    realm_range:
      min: "3阶焚野（金丹期）"
      max: "4阶揽月（元婴期）"
    personality_affinity:
      preferred: ["刻板", "严谨"]
      excluded: ["轻浮", "开朗"]

  # ---------- 红尘阁（7 个）----------
  - identity_id: "hongchen_liaison"
    sect: "hongchen"
    name: "联络官"
    description: "琴使或棋使下属的高级情报人员，负责与各据点的接头人对接，城府极深滴水不漏。"
    realm_range:
      min: "5阶观沧海（化神期）"
      max: "6阶叩天门（炼虚期）"
    personality_affinity:
      preferred: ["狡黠", "多疑"]
      excluded: ["友善", "诚实"]
  - identity_id: "hongchen_inner"
    sect: "hongchen"
    name: "内门门人"
    description: "红尘阁的核心门人，有权限接触高等情报，表面身份多半是某个文人雅士或商贾。"
    realm_range:
      min: "4阶揽月（元婴期）"
      max: "5阶观沧海（化神期）"
    personality_affinity:
      preferred: ["心思缜密", "敏锐"]
      excluded: ["轻浮", "开朗"]
  - identity_id: "hongchen_outer"
    sect: "hongchen"
    name: "外门门人"
    description: "红尘阁基层情报人员，以各种伪装身份活动于市井之间——可能是店小二、花匠、走方郎中。"
    realm_range:
      min: "筑基期"
      max: "金丹期"
    personality_affinity:
      preferred: []
      excluded: []
  - identity_id: "hongchen_shopkeeper"
    sect: "hongchen"
    name: "伪装经营者"
    description: "据点的表面经营人，入戏极深有时连自己都快忘了真实身份，演技是基本生存技能。"
    realm_range:
      min: "金丹期"
      max: "元婴期"
    personality_affinity:
      preferred: ["演技精湛", "圆滑"]
      excluded: ["诚实", "怯懦"]
  - identity_id: "hongchen_analyst"
    sect: "hongchen"
    name: "情报分析员"
    description: "负责整理分析各渠道传来的情报碎片，记忆力惊人能从蛛丝马迹中拼出真相。"
    realm_range:
      min: "4阶揽月（元婴期）"
      max: "5阶观沧海（化神期）"
    personality_affinity:
      preferred: ["多疑", "博学"]
      excluded: ["开朗", "轻浮"]
  - identity_id: "hongchen_enforcer"
    sect: "hongchen"
    name: "画使下属"
    description: "四使之画使的行动人员，擅长隐匿刺杀窃取等暗面工作，冷酷无情效率至上。"
    realm_range:
      min: "5阶观沧海（化神期）"
      max: "6阶叩天门（炼虚期）"
    personality_affinity:
      preferred: ["冷静", "寡言"]
      excluded: ["开朗", "友善"]
  - identity_id: "hongchen_outsider"
    sect: "hongchen"
    name: "外部线人"
    description: "红尘阁的外围临时雇员，不知道自己在为谁做事，只是拿钱办事的市井精明人。"
    realm_range:
      min: "凡人"
      max: "炼气期"
    personality_affinity:
      preferred: ["精明", "势利"]
      excluded: ["忠诚", "诚实"]

  # ---------- 通用/外部（5 个）----------
  - identity_id: "common_peasant"
    sect: "neutral"
    name: "凡人农夫"
    description: "村野之中靠耕作为生的百姓，淳朴老实圈子小，对修仙者既敬畏又本能地保持距离。"
    realm_range:
      min: "凡人"
      max: "凡人"
    personality_affinity:
      preferred: ["质朴", "怯懦"]
      excluded: ["狡黠", "慕强"]
  - identity_id: "common_merchant"
    sect: "neutral"
    name: "坊市商人"
    description: "城镇中经营商铺的商人，见多识广八面玲珑，对各种人和事都有自己的价码。"
    realm_range:
      min: "凡人"
      max: "凡人"
    personality_affinity:
      preferred: ["精明", "圆滑"]
      excluded: ["质朴", "刚直"]
  - identity_id: "common_wanderer"
    sect: "neutral"
    name: "游方散修"
    description: "无门无派的自由修士，游历四方增长见识，说话做事比较随性不守宗门规矩。"
    realm_range:
      min: "炼气期"
      max: "筑基期"
    personality_affinity:
      preferred: ["开朗", "狡黠"]
      excluded: ["刻板", "严谨"]
  - identity_id: "common_innkeeper"
    sect: "neutral"
    name: "客栈老板"
    description: "经营旅店的生意人，迎来送往阅人无数，是最可靠的情报集散地主人。"
    realm_range:
      min: "凡人"
      max: "凡人"
    personality_affinity:
      preferred: ["圆滑", "开朗"]
      excluded: ["寡言", "孤傲"]
  - identity_id: "common_bounty_hunter"
    sect: "neutral"
    name: "赏金猎人"
    description: "以接取悬赏为生的低阶修士，务实冷漠不太在意手段只关心里程碑上的灵石数目。"
    realm_range:
      min: "金丹期"
      max: "元婴期"
    personality_affinity:
      preferred: ["务实", "慕强"]
      excluded: ["友善", "怯懦"]

# ============================================================
# 二、性格成分池 — 独立标签，按组分簇
# 24 个标签，6 个性格组，每组内标签可自由组合
# ============================================================
personality_traits:
  # 阳光亲和组
  friendly:
    name: "友善"
    keywords: ["和善", "亲切", "好相处"]
    group: "阳光亲和"
    conflict_groups: ["孤高冷傲", "精明世故"]
  honest:
    name: "诚实"
    keywords: ["正直", "坦率", "耿直"]
    group: "阳光亲和"
    conflict_groups: ["孤高冷傲", "精明世故"]
  cheerful:
    name: "开朗"
    keywords: ["外向", "乐天", "爱笑"]
    group: "阳光亲和"
    conflict_groups: ["孤高冷傲", "精明世故"]
  warmhearted:
    name: "热心"
    keywords: ["乐于助人", "热情", "仗义"]
    group: "阳光亲和"
    conflict_groups: ["孤高冷傲", "精明世故"]

  # 稳重可靠组
  steady:
    name: "沉稳"
    keywords: ["稳重", "沉着", "踏实"]
    group: "稳重可靠"
    conflict_groups: ["精明世故", "孤高冷傲"]
  taciturn:
    name: "寡言"
    keywords: ["沉默", "话少", "内敛"]
    group: "稳重可靠"
    conflict_groups: ["精明世故", "孤高冷傲"]
  perceptive:
    name: "敏锐"
    keywords: ["洞察力强", "机敏", "精明"]
    group: "稳重可靠"
    conflict_groups: ["精明世故", "孤高冷傲"]
  reliable:
    name: "可靠"
    keywords: ["值得信赖", "负责", "靠谱"]
    group: "稳重可靠"
    conflict_groups: ["精明世故", "孤高冷傲"]

  # 铁面严厉组
  strict:
    name: "严厉"
    keywords: ["严格", "严肃", "不苟言笑"]
    group: "铁面严厉"
    conflict_groups: ["阳光亲和", "谨小慎微"]
  upright:
    name: "刚直"
    keywords: ["正直", "不阿", "讲原则"]
    group: "铁面严厉"
    conflict_groups: ["阳光亲和", "谨小慎微"]
  irritable:
    name: "暴躁"
    keywords: ["易怒", "急性子", "火爆"]
    group: "铁面严厉"
    conflict_groups: ["阳光亲和", "谨小慎微"]
  protective:
    name: "护短"
    keywords: ["护犊子", "重情义", "护着自己人"]
    group: "铁面严厉"
    conflict_groups: ["阳光亲和", "谨小慎微"]

  # 精明世故组
  cunning:
    name: "狡黠"
    keywords: ["滑头", "机变", "老狐狸"]
    group: "精明世故"
    conflict_groups: ["阳光亲和", "稳重可靠"]
  suspicious:
    name: "多疑"
    keywords: ["疑心重", "谨慎", "不轻信"]
    group: "精明世故"
    conflict_groups: ["阳光亲和", "稳重可靠"]
  smooth:
    name: "圆滑"
    keywords: ["八面玲珑", "不得罪人", "会来事"]
    group: "精明世故"
    conflict_groups: ["阳光亲和", "稳重可靠"]
  snobbish:
    name: "势利"
    keywords: ["看人下菜碟", "趋炎附势", "现实"]
    group: "精明世故"
    conflict_groups: ["阳光亲和", "稳重可靠"]

  # 谨小慎微组
  timid:
    name: "怯懦"
    keywords: ["胆小", "怕事", "畏缩"]
    group: "谨小慎微"
    conflict_groups: ["铁面严厉", "孤高冷傲"]
  hesitant:
    name: "犹疑"
    keywords: ["优柔寡断", "拿不定主意", "纠结"]
    group: "谨小慎微"
    conflict_groups: ["铁面严厉", "孤高冷傲"]
