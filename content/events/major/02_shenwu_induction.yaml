# 大事件：拜师入宗（神武门）
# 入门试炼之后的衔接事件——分配军种、引入日常生活
# 2场景：军种分配 → 第一天
event_id: "02_shenwu_induction"
name: "拜师入宗"
type: "major"
description: "入门试炼通过后。分配军种、安排住所、引入军旅生活。从应试者变成神武门弟子的第一步。"
difficulty: 1
tags: ["剧情", "入门", "日常"]

trigger_conditions:
  - type: "flag_check"
    required_flags: ["trial_completed", "shenwu_disciple"]

scenes:
  # ===== 场景一：军种分配 =====
  army_assignment:
    scene_id: "army_assignment"
    name: "军种分配"
    description: "次日清晨，你被叫到传功殿。殿里没有你想象中的教习——站着的是一个看起来不像武修的人，文质彬彬的，手里拿着一卷名单。他抬头看了你一眼：'铁鹫跟我说了。你被分到了——（看了一眼名单）——破阵军。走吧，带你去驻地。'"
    mood: "新鲜、未知、一切刚开始"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "传功殿内不像玄清宗那么书卷气——墙上挂着战图，案上摆着兵略玉简"
        - "孟方教习站在殿中，手里拿着一卷名单——上面是这一批通过试炼的弟子去向"
        - "不同的军种被不同的教习带走——有人去了破阵军方向，有人去了掠影军"
      sensory_details:
        - "清晨的龙陨山煞气比白天淡一些——但仍然能闻到那股特有的金铁味"
        - "远处各军已经开始晨练——整齐的操练声在山谷间回荡"
        - "孟方教习说话的语气很平淡——像在做一件他已经做了无数次的公事"
      npc_behavior_hints:
        - "孟方教习带路时不紧不慢，会简单介绍沿途经过的各个军种驻地"
        - "如果玩家问'为什么把我分到这个军'，孟方会说'铁鹫觉得你适合'"
        - "孟方不会多说关于分配理由的细节——这是他的一贯风格"

  # ===== 场景二：第一天 =====
  first_day:
    scene_id: "first_day"
    name: "第一天"
    description: "教习把你带到了一片帐篷区——空气中弥漫着铁锈和汗水的味道，远处传来整齐的操练声。你被带到一顶帐篷前，里面已经有三个人了。他们看了你一眼——然后继续做自己的事。教习说：'这是你的位置。明天寅时集合。别迟到。'然后走了。"
    mood: "陌生、新鲜、融入的开始"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "不同军种的驻地各具特色：破阵军的帐篷区整齐划一，中间有大型演练沙盘；掠影军的驻地小而分散"
        - "营帐内铺着简单的草席，每人一个储物箱和一套备用训练甲"
        - "帐篷里的三位同袍看起来已经习惯了新来的陌生人——看了一眼就继续做自己的事"
      sensory_details:
        - "帐篷里有一股铁锈和汗水的味道——那是长期训练积累下来的气息"
        - "外面操练声、铁甲碰撞声、队长的口令声此起彼伏，一刻不停"
        - "席子睡得久了会被压实——上一个住在这里的人刚走不久"
      npc_behavior_hints:
        - "三位同袍对新人的态度不一——有人完全不在意，有人可能会在有空时主动搭话"
        - "如果玩家主动问问题，同袍会回答但不热情——武修之间建立信任靠的是并肩训练"
        - "该军种的战队长（如分配到破阵军→段横川，御山军→石不移）可能会在某个时候出现"
        - "如果玩家不知道接下来该做什么——可以先整理床铺、认识同袍、或者自己去熟悉环境"

reward:
  cultivation_gain: 5
  set_flags:
    - "induction_completed"
