# 大事件：扶龙宫入门考核
# 舞台式设计——5场景：抵达神都→策论→文武→忠君誓言→结果
# 无预设选项，Agent 根据三窗口输入（言语/行为/心理）综合判定
event_id: "01_fulong_trial"
name: "扶龙宫入门考核"
type: "major"
description: "扶龙宫不走公开试炼之路，而是推荐制。考核以策论应对、文武基础与忠君誓言为主，由教习徐伯潜主持。"
difficulty: 2
tags: ["剧情", "入门", "考核", "礼仪"]

trigger_conditions:
  - type: "flag_check"
    required_flags: ["sect_chosen_fulong", "opening_flow_done"]

stage_setting:
  total_scenes: 4
  location_chain: ["神都皇城", "承运殿", "百艺苑演武场", "承运殿"]
  key_npcs: ["xu_boqian", "xie_yun", "zhou_yan", "ning_huaijing"]
  completion_condition: "玩家完成三个环节，由徐伯潜教习宣布结果和身份分配"

scenes:
  # ===== 前置场景：抵达神都 =====
  arriving:
    scene_id: "arriving"
    name: "皇城神都"
    description: "你站在神都皇城的东门外。承运殿的明黄色琉璃瓦在日光下像一团燃烧的火焰，远在皇城之外就能望见。四周的一切都那么井然有序——行人的脚步不紧不慢，店铺的门面整洁气派，空气中隐隐有龙脉灵气的精纯气息。一个穿着宫服的侍者核验了你的举荐信函，微微欠身：'请随我来。'"
    mood: "庄严、规整、无形的压迫感"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "神都皇城东北角是扶龙宫所在的宫苑区域，与皇宫有高墙甬道相连"
        - "承运殿的明黄色琉璃瓦在日光下闪耀，是整座皇城最显眼的建筑"
        - "路上遇到的烛龙卫站得笔直，目光直视前方，像雕像一样一动不动"
      sensory_details:
        - "空气中隐隐有龙脉灵气的气息——是整个中洲最精纯的灵气"
        - "安静——不是没有声音，而是所有声音都被宫墙和规矩压得很低"
        - "烛龙卫的目光从你身上扫过时，能感到一股若有若无的审视"
      npc_behavior_hints:
        - "引路的侍者态度恭敬但不亲近——这是宫中人的标准做派"
        - "如果玩家四处张望或大声说话，侍者不会提醒——但会微微皱眉"
        - "进入扶龙宫范围后，一切言行都要注意——这里规矩多"

  # ===== 场景一：策论 =====
  written_trial:
    scene_id: "written_trial"
    name: "承运殿策论"
    description: "承运殿内，金柱盘龙，地面铺以灵气氤氲的白玉砖。徐伯潜教习立于殿中央，手持一卷玉简。殿侧站着一个人——宁怀璟，你没有见过他，但一眼就能看出他是宗室子弟，因为那种从小养成的姿态是装不出来的。徐伯潜看着你，开口：'既然有举荐，想必不是庸才。我且问你几个问题。'"
    mood: "肃穆、正式、暗流涌动"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "承运殿正中最上方设九龙御座——宫主讲法时坐于此位"
        - "殿内金柱盘龙，地面白玉砖灵气氤氲"
        - "宁怀璟站在殿侧——他作为同届第一在场，但不参与考核，只是看"
      sensory_details:
        - "殿内有一股沉静的皇室熏香味，不是檀香，更加清冽"
        - "灵气浓郁得让人毛孔微微张开——龙脉之气的滋养确实名不虚传"
        - "安静得能听到自己衣服摩擦的声音"
      npc_behavior_hints:
        - "徐伯潜问问题时不紧不慢——他会等你思考，不会催促"
        - "如果玩家回答得好，徐伯潜眼底会有认可——但不会口头表扬"
        - "如果玩家回答得敷衍，徐伯潜会追问一句'就这些？'"
        - "宁怀璟全程一言不发——但他的目光会在玩家回答出色时微微变化"

  # ===== 场景二：文武 =====
  combat_trial:
    scene_id: "combat_trial"
    name: "百艺苑文武试"
    description: "策论之后，你被带到了百艺苑的演武场。这里比承运殿轻松了不少——至少看起来是这样。演武场的地面铺设有精密阵纹，可以模拟各种环境。一个温和的女教习站在场边——她看起来比徐伯潜好说话多了。她看着你，笑了笑：'别紧张。就是看看你的基础。'"
    mood: "比承运殿轻松——但也不能大意"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "百艺苑占地极广，划分出丹房、器室、演武场、悟道静室、阵法阁等多个区域"
        - "演武场下铺有精密阵纹，可模拟各种战斗环境"
        - "谢蕴教习站在场边，手里没有拿任何东西——她只是来看人的"
      sensory_details:
        - "百艺苑比承运殿有生气多了——远处能听到丹房里的炉火声和器室的锻打声"
        - "演武场的地面踩上去有微弱的阵纹波动——整个场地都在灵气的循环中"
        - "谢蕴教习的微笑让人放松——但你不知道她在看什么"
      npc_behavior_hints:
        - "谢蕴教习不会给具体指示——'展示一下你的基础就好'"
        - "她看的不仅是你的武艺——她在看你的态度、你的眼神、你遇到困难时的反应"
        - "如果玩家表现出色，谢蕴会点头——但不会多夸"
        - "如果玩家基础很差但态度认真，谢蕴也会记在心里——扶龙宫不缺天赋好的人，缺的是踏实的人"

  # ===== 场景三：忠君誓言 =====
  oath_trial:
    scene_id: "oath_trial"
    name: "忠君誓言"
    description: "你再次站在承运殿中。这一次殿里多了一个人——一个甲胄冰冷的卫士站在殿门旁，手按在剑柄上，目光如铁。徐伯潜教习站在九龙御座前方，手里多了一卷金色的卷轴。他展开卷轴，说了一句话：'跪下。宣读誓言。'殿内安静得能听到香灰落下的声音。"
    mood: "庄严到近乎压迫"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "承运殿回到了最初的起点，但气氛完全不同"
        - "周衍统领站在殿门旁，手按剑柄——他是来见证的"
        - "金色卷轴上写着忠君誓言的内容——代代相传的固定格式"
      sensory_details:
        - "殿内安静到了极致——连自己的呼吸声都显得突兀"
        - "周衍的目光像一柄没有出鞘的刀——不冷，但你知道它在"
        - "宣读誓言时，声音在空旷的大殿里会有一点回音"
      npc_behavior_hints:
        - "这是最严肃的环节——整个考核中没有人在这里出差错"
        - "徐伯潜念一句，玩家跟着念一句——不需要改动，也不需要发挥"
        - "周衍全程面无表情，但他的存在本身就让这个环节有了重量"
        - "如果玩家在宣读时表现出犹豫或轻浮——所有人都看得见"

  # ===== 场景四：结果宣布 =====
  result:
    scene_id: "result"
    name: "结果宣布"
    description: "誓言宣读完毕。徐伯潜收起金色卷轴，看了你一眼。他脸上没有什么表情——但你注意到他刚才念誓言的时候，声音比平时低了一些。他开口说了三个字——决定了你未来在扶龙宫的身份。"
    mood: "尘埃落定、身份的确定"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "殿里只剩下徐伯潜和你两个人——周衍已经无声地退了出去"
        - "阳光透过殿门的缝隙照进来，在地面上投下一道金色的光柱"
      sensory_details:
        - "宣读誓言后的安静和之前不一样——之前的安静是等待，现在的安静是定局"
        - "徐伯潜的声音恢复了一贯的平静"
      npc_behavior_hints:
        - "优异（策论见解出色+文武表现优秀+誓言庄重）→ 微微点头：'内宫。'"
        - "普通（稳定通过，无亮点无失误）→ 公事公办：'外宫。勤勉修行。'"
        - "勉强（明显不足但仍有可取）→ 面无表情：'外宫。以后——多用功。'"
        - "宣布完毕后给身份令牌——不同的颜色代表内宫或外宫"
        - "最后说一句'明日来承运殿报到，会有人带你去你的地方。'然后离开"

reward:
  cultivation_gain: 15
  add_items:
    - item_id: "low_grade_spirit_stone"
      quantity: 20
  set_flags:
    - "trial_completed"
    - "fulong_disciple"
