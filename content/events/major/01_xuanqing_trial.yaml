# 大事件：玄清宗入门试炼
# 舞台式设计——5场景：抵达山门→文试→法试→心镜→结果
# 无预设选项，Agent 根据三窗口输入（言语/行为/心理）综合判定
event_id: "01_xuanqing_trial"
name: "玄清宗入门试炼"
type: "major"
description: "玄清宗入门三关——传功殿文试、四象台法试、万道碑心镜。由接引长老主持，阵院教习陆沉舟旁观察。"
difficulty: 3
tags: ["剧情", "入门", "考核"]

trigger_conditions:
  - type: "flag_check"
    required_flags: ["sect_chosen_xuanqing", "opening_flow_done"]

stage_setting:
  total_scenes: 4
  location_chain: ["清妙山山门", "传功殿", "四象台", "万道碑"]
  key_npcs: ["xuanqing_elder", "lu_chenzhou"]
  completion_condition: "玩家完成三关试炼，由清玄长老宣布结果"

scenes:
  # ===== 前置场景：抵达山门 =====
  arriving:
    scene_id: "arriving"
    name: "清妙山初临"
    description: "你沿着悬空仙岛的虹桥走进清妙山。脚下是流光符文廊道，两侧的紫竹在风中沙沙作响，空气中弥漫着一股清灵的香气。远方有钟声传来——不是急促的警钟，而是平和的报时钟，在群山中悠悠回荡。一个身着月白色弟子服的年轻人迎了上来。"
    mood: "期待、宁静、暗含紧张"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "清妙山主峰四周悬浮着数十座大小不一的仙岛，以虹桥和流光符文廊道相连"
        - "山门到主殿共九重台地，每一层都比下一层更接近云霄"
        - "远处可见天河泻玉的瀑布自云海中垂落"
      sensory_details:
        - "空气中弥漫着静心紫竹的清香，沁人心脾"
        - "风中隐约有天河泻玉的水声和远处的钟声交织"
      npc_behavior_hints:
        - "接引弟子态度友好但不啰嗦，会带路到客房、简单介绍宗门布局"
        - "如果玩家问试炼内容，弟子会说'明天就知道了'，但可能会透露一点自己的经验"
        - "如果玩家四处乱走，只要不闯禁区就不会被严厉阻止——新人第一天可以理解"
        - "今晚的清妙山很安静，适合散步也适合休息"

  # ===== 场景一：文试 =====
  written_trial:
    scene_id: "written_trial"
    name: "传功殿文试"
    description: "传功殿内檀香袅袅，后墙悬着数卷古训玉简。清玄长老立于殿中央，身前一张案几，上铺一卷空白玉简和一支灵墨笔。几名和你一样的应试者站在两侧，有的紧张得攥着衣角，有的故作镇定。长老的目光缓缓扫过你们每一个人。"
    mood: "庄重、肃穆、略带压迫感"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "传功殿内青烟袅袅，后墙古训玉简悬垂如帘"
        - "案几上铺着一卷空白玉简和一支灵墨笔——玉简是空的"
        - "其他应试者站在两侧，神态各异，各自紧张或故作镇定"
      sensory_details:
        - "殿内有一股沉静的檀香味，让人不自觉收敛心神"
        - "安静得能听到自己的心跳声和旁边人轻微的呼吸"
      npc_behavior_hints:
        - "清玄长老问完问题后沉默等待，不催促也不提示"
        - "回答肤浅时，长老会追问一句'就这样吗？'"
        - "回答出色时，长老眼底会闪过认可——但嘴上只说'嗯'"
        - "不懂装懂时，长老不当场揭穿但会在心里扣分"
        - "文试结束时长老会说一句简短评价——措辞很讲究"

  # ===== 场景二：法试 =====
  magic_trial:
    scene_id: "magic_trial"
    name: "四象台法试"
    description: "四象台的白玉广场在正午阳光下泛着温润的光。地面镶嵌的四色灵石——青龙位的青、白虎位的白、朱雀位的红、玄武位的黄——在阵法的驱动下微微发光。你一踏上广场就感到灵气浓度骤增，皮肤能感到微微的刺麻。除了清玄长老，还有一个你不认识的教习站在台侧——那人看起来温和无害，但目光很专注。"
    mood: "紧张、专注、力量在汇聚"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "四象台以四色灵石镶嵌青龙白虎朱雀玄武四象阵图，灵气比外界浓郁三倍"
        - "台四周立有十二根符文柱，战时可为护山大阵提供能量"
        - "陆沉舟教习站在台侧，双手拢在袖中，目光平静但一刻不离"
      sensory_details:
        - "脚下灵石传来的灵气浓郁到皮肤能感到微微刺麻"
        - "四象台在正午阳光下泛着温润的白光，四色灵石隐隐流转"
        - "空气中灵气的浓度让呼吸都比平时更深、更慢"
      npc_behavior_hints:
        - "清玄长老示意开始，没有具体指示——'展示你的能力'"
        - "陆沉舟站在台侧旁观，不说话，表情不变"
        - "施术精准时，陆沉舟目光会更专注——这是他唯一的变化"
        - "灵气失控时，清玄长老会一步上前帮忙稳住——不会责备"
        - "迟迟不出手时，清玄长老会等——等待本身是一种压力"

  # ===== 场景三：心镜 =====
  heart_trial:
    scene_id: "heart_trial"
    name: "万道碑心镜"
    description: "万道碑立于清妙山主峰绝壁之上，如同一面被岁月打磨了无数年的巨镜。碑面光滑如镜却什么都映不出来——没有天空、没有山峰、没有你自己的倒影。清玄长老示意你坐在碑前的蒲团上。风声在这一刻似乎远去了。"
    mood: "空旷、寂静、内心被放大"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "万道碑刻于清妙山主峰绝壁之上，是玄清宗传承之基"
        - "祖师闻人钰飞升前以无上神念刻于山壁，碑身无字唯有神念留痕"
        - "十一代飞升祖师均在碑上留下了核心感悟"
      sensory_details:
        - "风声在靠近万道碑时似乎远去了——不是消失了，是被某种存在'吸收'了"
        - "坐在碑前能感到一种古老而温和的注视感——不是眼睛，是神念"
        - "碑面光滑如镜但什么都不映——它在等你的心"
      npc_behavior_hints:
        - "清玄长老在玩家入座后退到远处，不影响玩家"
        - "全程不说话，一刻钟后轻声说一句'可以了'"
        - "无论玩家看到了什么或什么也没看到，长老都不会评价"

  # ===== 场景四：结果宣布 =====
  result:
    scene_id: "result"
    name: "试炼结果"
    description: "你再次站在传功殿中。香炉的青烟还在袅袅升起，但这一次殿里只有你和清玄长老两人。他手中的玉简上多了几行字。他看了一会儿，抬起头来。"
    mood: "尘埃落定、等待审判"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "传功殿回到了最初的起点——但心境已经完全不同"
        - "清玄长老手中的玉简上多了几行字——那是三关的结果"
      sensory_details:
        - "檀香还是那股檀香，但这一次闻起来不再让人紧张"
        - "长老抬起头来看你的时候，殿里安静得能听到香灰落下的声音"
      npc_behavior_hints:
        - "宣布结果时措辞精确——措辞本身反映评价层级"
        - "优异→微微点头：'不错'；普通→公事公办：'通过了'；勉强→面无表情：'通过了，以后勤勉些'"
        - "如果玩家辩解，长老会给机会说话但不一定会改变结果"
        - "宣布完后给身份玉简——'明日来传功殿报到'——然后离开"

reward:
  cultivation_gain: 20
  add_items:
    - item_id: "low_grade_spirit_stone"
      quantity: 10
  set_flags:
    - "trial_completed"
    - "xuanqing_disciple"
