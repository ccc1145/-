# 大事件：拜师入宗（扶龙宫）
# 入门考核后的衔接——分配内宫/外宫身份，安排住所
event_id: "02_fulong_induction"
name: "拜师入宗"
type: "major"
description: "入门考核通过后。分配内宫/外宫身份、安排住所、引入宫中生活规矩。"
difficulty: 1
tags: ["剧情", "入门", "日常"]

trigger_conditions:
  - type: "flag_check"
    required_flags: ["trial_completed", "fulong_disciple"]

scenes:
  # ===== 场景一：宫籍分配 =====
  status_assignment:
    scene_id: "status_assignment"
    name: "宫籍分配"
    description: "次日清晨，你再次来到承运殿。这一次没有策论也没有誓言——谢蕴教习在殿外等你，手里拿着一卷名册。她看到你，笑了笑：'走吧，带你去你的住处。'——然后她看了看名册，微微顿了一下，那一下顿得极短。你注意到了，但你不知道那意味着什么。"
    mood: "确定身份后的新鲜感"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "承运殿清晨的光线和昨天不太一样——可能是心情变了"
        - "谢蕴教习手里的名册上画着不同的标记——内宫和外宫的分配一目了然"
        - "如果玩家被分到内宫，住处更靠近承运殿；外宫则在宫苑边缘"
      sensory_details:
        - "清晨的扶龙宫比白天安静得多，偶尔有早起的侍者在廊下快步走过"
        - "不同区域的灵气温差——越靠近承运殿方向，龙脉灵气越浓郁"
        - "谢蕴教习带路的脚步不急不慢——她走这条路走了很多年了"
      npc_behavior_hints:
        - "谢蕴教习会简单介绍住处附近的设施和规矩——不会太多，第一天够用就行"
        - "如果玩家被分到外宫，谢蕴的语气会更温和一些——但她不会明说原因"
        - "如果玩家被分到内宫，谢蕴会保持公事公办的态度"

  # ===== 场景二：第一天 =====
  first_day:
    scene_id: "first_day"
    name: "第一天"
    description: "住处安排好了。一间不大但整洁的房间——窗明几净，案上放着扶龙宫的宫规手册和一份课表。窗外是整齐的宫苑走廊，偶尔有宫装弟子走过。远处传来晨课的诵读声。你的扶龙宫第一天，开始了。"
    mood: "新鲜、规矩、新生活的开始"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "内宫和外宫的住所规格不同——内宫的房间更大、灵气更浓"
        - "案上放着宫规手册——第一天最好先翻一翻"
        - "课表上列出了每天的作息：卯时起床、辰时课业、戌时晚课"
      sensory_details:
        - "窗外能听到远处晨课的诵读声——'皇极惊世，以法为纲……'"
        - "房间里有一股淡淡的熏香味——和承运殿里的味道一样，只是淡一些"
        - "有人从窗外经过时，脚步都很轻——宫里的规矩教出来的"
      npc_behavior_hints:
        - "如果玩家是内宫弟子，隔壁可能住着宗室子弟——遇到时注意礼仪"
        - "如果玩家是外宫弟子，附近住着的外姓弟子可能会主动来打招呼"
        - "课表上的第一堂课是辰时——在那之前可以熟悉一下环境"
        - "扶龙宫的规矩比想象中多——但第一天犯点小错通常不会受罚"

reward:
  cultivation_gain: 5
  set_flags:
    - "induction_completed"
