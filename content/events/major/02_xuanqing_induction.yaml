# 大事件：拜师入宗
# 入门试炼之后的衔接事件——分配院系、引入日常生活
# 2场景：院系分配 → 第一天
event_id: "02_xuanqing_induction"
name: "拜师入宗"
type: "major"
description: "入门试炼通过后的第二天。分配院系、安排住所、引入日常生活。从应试者变成弟子的第一步。"
difficulty: 1
tags: ["剧情", "入门", "日常"]

trigger_conditions:
  - type: "flag_check"
    required_flags: ["trial_completed", "xuanqing_disciple"]

scenes:
  # ===== 场景一：院系分配 =====
  academy_assignment:
    scene_id: "academy_assignment"
    name: "院系分配"
    description: "次日清晨，你再次来到传功殿。清玄长老不在，但另一位教习在等你——他在一张卷轴上写着什么，抬头看了你一眼：'你来了。走吧，带你去你的院系。'"
    mood: "新鲜、期待、一切刚开始"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "传功殿比昨日清静了许多——没有其他应试者，只有一位教习在整理卷轴"
        - "清妙山的清晨雾气还未散尽，晨光透过悬空仙岛的间隙洒下来"
        - "从传功殿到各院系的路途不长，沿途可以听到其他院系的晨课声"
      sensory_details:
        - "清晨的紫竹香气比白天更浓——露水打湿了竹叶"
        - "远处传来四象台上弟子集体吐纳的呼吸声——卯时晨课已经开始了"
        - "教习走得不快不慢，偶尔停下来等你跟上"
      npc_behavior_hints:
        - "带路的教习话不多，只做必要的介绍——'这里是阵院''那边是术院'"
        - "如果玩家问被分到什么院系，教习会说'到了就知道了'"
        - "教习的态度中立——不热情也不冷淡，公事公办"

  # ===== 场景二：第一天 =====
  first_day:
    scene_id: "first_day"
    name: "第一天"
    description: "教习带你到了院系的所在地，简单交代了几句就走了。你站在新的环境中——周围的人不认识、规矩不清楚、连膳堂在哪都不知道。但这就是开始。"
    mood: "茫然、新鲜、自由的开始"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "不同院系的环境各异：阵院有大量的阵盘和推演沙盘；术院有开阔的演法场地；丹器院飘着淡淡的药香"
        - "院系里已经有弟子在活动——有的在晨课，有的在各自忙碌"
        - "你被安排的住所是一间简朴的小屋——一张床、一张桌、一个蒲团"
      sensory_details:
        - "新环境里的一切都是陌生的——面孔、气味、声音"
        - "远处不时传来晨课的诵读声或弟子讨论的谈话声"
        - "安静的时候能听到紫竹林的沙沙声——和昨天听到的一样，但你已经不算是'外人'了"
      npc_behavior_hints:
        - "周围的弟子对新人的态度不一——有人好奇地多看两眼，有人完全不在意"
        - "如果玩家主动搭话，大部分弟子会友善回应"
        - "被分配到的院系的教习（如果有预设NPC如陆沉舟）可能会在某个时候出现"
        - "如果玩家不知道下一步该做什么——可以自己决定。这就是日常的开始"

reward:
  cultivation_gain: 5
  set_flags:
    - "induction_completed"
