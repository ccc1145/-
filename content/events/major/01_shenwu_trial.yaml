# 大事件：神武门入门试炼
# 舞台式设计——5场景：抵达龙陨山→千钧道→煞气池→试剑台→结果
# 无预设选项，Agent 根据三窗口输入（言语/行为/心理）综合判定
event_id: "01_shenwu_trial"
name: "神武门入门试炼"
type: "major"
description: "神武门以残酷著称的三关试炼——负重远征千钧道、煞气池抗性考验、试剑台实战考核。由巡天军战队长铁鹫主持。"
difficulty: 4
tags: ["剧情", "入门", "战斗", "考核"]

trigger_conditions:
  - type: "flag_check"
    required_flags: ["sect_chosen_shenwu", "opening_flow_done"]

stage_setting:
  total_scenes: 4
  location_chain: ["龙陨山脉山脚", "千钧道", "煞气池", "试剑台"]
  key_npcs: ["tie_jiu", "meng_fang", "duan_hengchuan"]
  completion_condition: "玩家完成三关试炼，由铁鹫战队长宣布结果"

scenes:
  # ===== 前置场景：抵达龙陨山 =====
  arriving:
    scene_id: "arriving"
    name: "龙陨山脚"
    description: "你站在龙陨山脉的山脚下。空气中弥漫着浓烈的金铁之气——混着若有若无的血腥味。耳边是远处演武场传来的撞击声和百炼瀑的轰鸣声。脚下是玄黑石铺成的地面，踩上去比普通石头凉得多。头顶是看不到顶的千钧道——一千零八十级石阶，每一级都在散发着若有若无的重力波动。铁鹫战队长站在第一级台阶旁，目光扫过你们所有人，只说了一个字：'上。'"
    mood: "沉重、压迫、战意"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "龙陨山脉由玄黑石与暗青色铁岩构成，整座宗门像一座从山体里凿出来的要塞"
        - "千钧道通往主殿，共一千零八十级石阶，每一级都施加了重力阵法"
        - "同行还有数名应试者——神态各异，有人咬牙、有人深呼吸、有人脸色发白"
      sensory_details:
        - "空气中有浓烈的金铁之气混着淡淡的血腥味——龙陨山脉独有的煞气味道"
        - "耳边是试剑台上兵器交击的轰鸣和百炼瀑的冲击声，像闷雷一样连绵不绝"
        - "脚下的玄黑石地面冰凉彻骨，踩上去的温度和普通石头完全不一样"
      npc_behavior_hints:
        - "铁鹫说完'上'字之后转身开始登山——不会等任何人"
        - "其他应试者反应各异——有人咬牙冲出去，有人深呼吸做准备，有人面色发白"
        - "铁鹫全程不会回头看——但他知道谁在什么位置"

  # ===== 场景一：千钧道 =====
  trial_stamina:
    scene_id: "trial_stamina"
    name: "千钧道负重远征"
    description: "你背上了那副百斤铁甲。第一级台阶——只是比普通台阶重一点。第十级——双腿开始感受到压力。第五十级——呼吸变粗了。第一百级——你开始明白为什么叫'千钧道'了。你抬头看了看——还有九百八十级。铁鹫战队长在高处，只是一个越来越小的背影。"
    mood: "沉重、漫长得看不到尽头"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "千钧道共一千零八十级，越往上走重力越大"
        - "第365级台阶正中有一个深约一寸的脚印——是前辈突破时踩出来的"
        - "沿途可见石阶上的磨损痕迹和先辈留下的武器刻痕"
      sensory_details:
        - "每走一步，都能感到骨骼在重压下发出细微的咯吱声"
        - "汗水刚渗出就被重力压成了雾气，后背的铁甲越来越沉"
        - "重力大到呼吸都变得吃力，心跳像擂鼓一样在耳边响"
      npc_behavior_hints:
        - "铁鹫全程在高处，不会回头看——但他知道每个人的位置"
        - "如果有人摔倒后又爬起来——铁鹫会看到"
        - "如果有人爬不起来——会有巡天卫来把人接走（意味着淘汰）"
        - "如果有人中途帮助其他摔倒的应试者——铁鹫会看到"
        - "第365级的脚印踩上去不会真的变轻松——但很多新兵都会去踩一下"

  # ===== 场景二：煞气池 =====
  trial_resistance:
    scene_id: "trial_resistance"
    name: "煞气池抗性考验"
    description: "翻过千钧道顶后，你被带到了另一处地方——一处天然形成的煞气汇聚之地。池中煞气如黑雾翻涌，站在边缘就能感到皮肤被针扎般的刺痛。越靠近池边越痛，胸口发闷、气息紊乱。铁鹫战队长站在池边，旁边还有一个你没有见过的教习模样的人——那人手里拿着一卷空白记录，看着你们，像是要记录什么数据。"
    mood: "刺痛、压抑、意志的拉锯"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "煞气池是龙陨山脉天然形成的煞气汇聚之地，池中黑雾翻涌"
        - "越靠近池边煞气越浓，皮肤刺痛感越强，胸口发闷、气息紊乱"
        - "孟方教习站在池边不远处的记录台旁，手持空白卷轴和笔墨"
      sensory_details:
        - "靠近池边就像有无数细针同时在扎皮肤和经脉"
        - "煞气侵入经脉时会有一种冰冷的灼烧感——矛盾但真实"
        - "坚持时间越长，身体会开始不自觉地颤抖，牙关咬紧"
      npc_behavior_hints:
        - "铁鹫仍然不说话，只是看着——他的沉默本身就是一种压力"
        - "孟方教习在记数据——记录每个应试者的坚持时间、接近距离、身体反应"
        - "如果有人坚持不住自行后退，孟方会平静地记下时间，不会挽留"
        - "如果有人咬牙坚持到了远超平均的时间，孟方会在记录上多写一笔，抬头多看一眼"
        - "如果玩家事后和孟方说话，孟方会说'你的数据不错'——仅此而已"

  # ===== 场景三：试剑台 =====
  trial_combat:
    scene_id: "trial_combat"
    name: "试剑台实战考核"
    description: "最后一座试剑台——悬浮的黑曜石平台，由玄铁锁链与主峰相连。对面站着一个神武门的内门弟子，面无表情地看着你，手中握着训练用的制式铁剑。台侧站着铁鹫——还有一个你没有见过的大块头，一身重甲，双臂抱胸，沉默地看着台上。铁鹫说了一句话：'三十回合。不倒，算过。'然后他退到台边。"
    mood: "紧张、安静、风雨欲来"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "试剑台是数十座悬浮于主峰之间的巨大黑曜石平台之一"
        - "四周有防护阵法防止逸散的力量伤及观战者"
        - "段横川站在另一侧台边，一身重甲，双臂抱胸，不评论但全程在看"
      sensory_details:
        - "脚下黑曜石台面冰冷坚硬——踩上去的重量感和普通石台完全不同"
        - "对面内门弟子的目光带着审视——不是敌意，但也没有放水的意思"
        - "周围的声音在铁鹫说'开始'的那一刻突然安静了下来"
      npc_behavior_hints:
        - "内门弟子不会放水——但也不会下死手。这是考核，不是生死战"
        - "铁鹫站在台侧，双手抱胸，面无表情地看"
        - "段横川站在另一侧——他不评论，但他全程在看"
        - "如果玩家展现出出色的战斗意识，段横川的眼神会有变化"
        - "三十回合内被打倒——铁鹫会喊停，不会补刀，但算作未通过"
        - "撑过三十回合——铁鹫会简短地说'够了'。不会多夸"

  # ===== 场景四：结果宣布 =====
  result:
    scene_id: "result"
    name: "试炼结果"
    description: "你再次站在山脚下。抬头是千钧道——你还记得每一级台阶的重量。铁鹫战队长站在你面前，手里什么都没拿。他看了你一眼。"
    mood: "尘埃落定、等待"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "回到了最初的起点——千钧道脚下"
        - "铁鹫站在你面前，手里没拿任何东西——他不看记录，他看过你，就够了"
      sensory_details:
        - "此刻的空气还是那股金铁味，但你已经不再觉得刺鼻了"
        - "远处还是那些声音——但你现在知道那些声音意味着什么了"
      npc_behavior_hints:
        - "优异——微微点头，一个字：'行。'（铁鹫的最高评价）"
        - "普通——公事公办：'过了。'"
        - "勉强——面无表情：'算你过了。'然后转身走"
        - "如果玩家想问分配去向，铁鹫会说'明天有人告诉你'"
        - "宣布完后铁鹫不会多停留——他还有下一批新兵要看"
        - "段横川如果看中了玩家，会在铁鹫走后多站一会儿——但不一定会说话"

reward:
  cultivation_gain: 25
  add_items:
    - item_id: "low_grade_spirit_stone"
      quantity: 15
  set_flags:
    - "trial_completed"
    - "shenwu_disciple"
