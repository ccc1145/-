# 大事件：拜师入宗（红尘阁）
# 入门考核后的衔接——分配身份、介绍据点规则
event_id: "02_hongchen_induction"
name: "拜师入宗"
type: "major"
description: "通过红尘阁入门考核后。分配初步身份、介绍据点运作方式、引入情报工作日常。"
difficulty: 1
tags: ["剧情", "入门", "日常"]

trigger_conditions:
  - type: "flag_check"
    required_flags: ["trial_completed", "hongchen_disciple"]

scenes:
  # ===== 场景一：身份安排 =====
  role_assignment:
    scene_id: "role_assignment"
    name: "身份"
    description: "第二天，你被叫到百花舫后院的账房。沈娘子坐在那里，面前放着一本新开的档案——你的名字已经写在扉页上了。她没有抬头，但你进来的时候她停了一下笔。'你的身份——从今天起是百花舫新来的杂役。'她翻了翻面前的一张纸，语气平淡。'管吃管住，月钱两枚灵石。遇到有人问——你是从南边逃荒来的，有个远房亲戚在百花舫做事，托了关系进来的。记住这套说辞，别漏了。'"
    mood: "一切从头开始"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "账房不大，案上堆着账本和散落的灵石"
        - "沈娘子的桌角放着一本新档案——你的名字在上面"
        - "角落里堆着几套杂役的衣服——其中一套是你的"
      sensory_details:
        - "账房里混合着旧纸和墨汁的味道"
        - "窗外是百花舫后院——白天看起来和晚上完全不同，像一个普通的院子"
        - "沈娘子的声音很平——但她停笔的那一下，你知道她在看你"
      npc_behavior_hints:
        - "沈娘子公事公办——她会交代清楚你的身份设定、月钱、住所"
        - "如果玩家问'我具体要做什么'，沈娘子会说'杜老板会安排'"
        - "沈娘子不会多说一句多余的话——但你可以注意她没说的那些"

  # ===== 场景二：第一天 =====
  first_day:
    scene_id: "first_day"
    name: "第一天"
    description: "你换上了杂役的衣服。布料粗、款式简单。你从后院走到前堂的时候，正碰上一个穿得花枝招展的女子——她看了你一眼，笑了。'新来的？长得挺精神。'她没有停下来，边走边说：'别紧张——第一天都这样。过几天你就习惯了。'你的红尘阁第一天，就这么稀松平常地开始了。"
    mood: "平凡——这正是最好的伪装"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "白天的百花舫和晚上完全不同——安静、阳光从窗口照进来"
        - "后院有几个杂役在干活——有的扫地、有的搬东西、有的在洗菜"
        - "前堂的桌椅都收起来了——和晚上灯红酒绿的样子截然不同"
      sensory_details:
        - "白天的百花舫里没有了酒气和脂粉味——取而代之的是木头和水的气味"
        - "阳光从窗口照进来，照亮了白天才看得见的灰尘"
        - "后院厨房里传来锅碗瓢盆的声音和老许低沉的咳嗽声"
      npc_behavior_hints:
        - "其他杂役对新人的态度——有人好奇地多看两眼，有人完全不在意"
        - "如果玩家主动搭话，大多数人会友善回应——'你从哪来的？'"
        - "红萼可能在楼梯口遇到你——她会笑着打趣一句'杂役也挺适合你的'"
        - "老许在后院厨房——他看到你时会多看一眼，但什么都不会说"
        - "第一天不会有人给你安排真正的任务——先熟悉环境"

reward:
  cultivation_gain: 5
  set_flags:
    - "induction_completed"
