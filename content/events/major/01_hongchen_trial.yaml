# 大事件：红尘阁入门考核
# 舞台式设计——5场景：抵达百花舫→观心→入幻→血誓→结果
# 无预设选项，Agent 根据三窗口输入综合判定
event_id: "01_hongchen_trial"
name: "红尘阁入门考核"
type: "major"
description: "红尘阁的入门不对外公开——阁中老人观察物色合适人选，三关考验：观心、入幻、保密。由百花舫舫主杜若主持。"
difficulty: 3
tags: ["剧情", "入门", "幻境", "考验"]

trigger_conditions:
  - type: "flag_check"
    required_flags: ["sect_chosen_hongchen", "opening_flow_done"]

stage_setting:
  total_scenes: 4
  location_chain: ["百花舫", "百花舫三层", "红尘幻境（小型）", "密室"]
  key_npcs: ["du_ruo", "hong_e", "su_niangzi", "shen_niangzi"]
  completion_condition: "玩家完成三关考验，由杜若宣布通过"

scenes:
  # ===== 前置场景：抵达百花舫 =====
  arriving:
    scene_id: "arriving"
    name: "玉带河上"
    description: "神都玉带河上，华灯初上。一艘三层高的华丽画舫停在水中央，雕梁画栋的红灯笼倒映在水面上，随着水波轻轻晃动。丝竹声从舫中隐隐传出，偶尔夹杂着笑声和杯盏碰撞的声音。你被带上了舫——不是从正门，而是从侧面一道不起眼的小梯。二楼转三楼的楼梯口，有人拦住了你。'第一次来？'对方打量了你一眼，然后让开了路。"
    mood: "灯红酒绿、暗流涌动"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "百花舫外观华丽，一至二层对外开放，三层需特定信物方可入内"
        - "从侧面小梯上楼时，能听到一楼大堂的丝竹声和客人的谈笑声"
        - "二楼转三楼的楼梯口站着一个沉默的守卫——他看了你一眼就让你过去了"
      sensory_details:
        - "空气中混合着酒香、脂粉气和隐隐的熏香——是风月场特有的味道"
        - "脚下的木板随着水波轻轻晃动，舫外是玉带河两岸的灯火"
        - "越往楼上走音乐声越小、越安静——上面和下面是两个世界"
      npc_behavior_hints:
        - "引路的人话很少——只带路，不回答任何问题"
        - "守卫看了你一眼才让路——那一眼就是一次评估"
        - "第一次来百花舫的人会感到一种微妙的矛盾——这里很热闹，但每一步都在被人观察"

  # ===== 场景一：观心 =====
  observation_trial:
    scene_id: "observation_trial"
    name: "百花舫·观心"
    description: "三楼的厢房。窗外是玉带河的夜灯和丝竹声，窗内是一桌酒菜。杜若坐在你对面，笑着给你倒了一杯酒。她自己也倒了一杯，举起来，没有急着喝——只是举着，透过酒杯的琥珀色液体看着你。'你的事——我听说过一些。'她笑得很自然。'来，先喝一杯，不用急着说。'"
    mood: "轻松的试探——每一句话都是钩子"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "厢房不大但雅致——墙上挂着一幅山水画，案上放着一把未出鞘的短匕（装饰品）"
        - "窗外是玉带河的夜景和对岸的万家灯火"
        - "杜若坐在你对面，姿态放松——但她的目光一刻都没有离开过你"
      sensory_details:
        - "酒是温的，带着一股淡香——不是什么烈酒，但后劲不小"
        - "楼下隐隐传来弹唱声——有人在唱一曲关于离别的词"
        - "房间里只有你们两个——但你不确定是不是真的只有你们两个"
      npc_behavior_hints:
        - "杜若不会直接问敏感问题——她会先聊家常、聊你来的路上、聊神都的天气"
        - "她会注意到你喝酒的速度、你看窗外还是看她、你说话时有没有不自觉地摸鼻子"
        - "如果有人推门进来敬酒或传话——那可能是安排好的，杜若会观察你的反应"
        - "整个过程中，杜若只观察、不评判——她把评判留在最后"
      special_note: "红萼会在某个节点'不经意地'推门进来送一碟点心或添一壶酒——她会和杜若交换一个极短的眼神。如果玩家注意到了那个眼神，那就是加分项。"

  # ===== 场景二：入幻 =====
  illusion_trial:
    scene_id: "illusion_trial"
    name: "红尘幻境·入幻"
    description: "你记得自己是怎么来到这里的——杜若问了你一个问题，你回答了，然后世界就像水面泛起了涟漪一样扭曲了一瞬。等你的视线重新聚焦时，你发现自己已经不在那间厢房里了。你站在一条陌生的街道上——可能是某个你从未去过的城市，也可能是一个你只在梦里见过的地方。"
    mood: "似真似幻、不知身在何处"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "幻境场景由 Agent 根据玩家背景生成——可能繁华、可能荒凉、可能熟悉、可能陌生"
        - "幻境中存在一些'破绽'——比如不会动的风车、没有回声的脚步、不会落地的叶子"
        - "幻境中的 NPC 会和你对话——他们的每一句话都可能是一种试探"
      sensory_details:
        - "幻境中的一切看起来都真实——但有什么地方'不对'"
        - "时间感变得模糊——你可能觉得是一炷香，也可能觉得是一整天"
        - "阳光（如果有的话）不会刺眼——幻境里的光总是恰到好处"
      npc_behavior_hints:
        - "幻境中没有人告诉你这是幻境——你必须自己意识到"
        - "如果玩家意识到这是幻境并尝试突破，幻境会开始崩塌——那就算是'过'了"
        - "如果玩家在幻境中沉迷、恐惧或失控——苏娘子（远程操控幻境）会记录，杜若之后会知道"
        - "没有人会叫醒你——你必须自己走出来"

  # ===== 场景三：血誓 =====
  oath_trial:
    scene_id: "oath_trial"
    name: "密室·血誓"
    description: "你醒了——或者说是你的意识从幻境中抽离了回来。你还是在那间厢房里，酒还是温的，窗外的灯还是亮着的。杜若还是坐在你对面。她看着你，表情和之前一样——但目光里多了一丝认真的东西。她没有说话，起身走到墙边——你之前没注意到那面墙上有一道暗门。她推开门，做了一个'请'的手势。门后是一条狭窄的向下的通道。"
    mood: "从试探到确认"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "暗门后的通道向下延伸——通往百花舫的底层密室"
        - "密室不大，四壁是朴素的石墙，只有一张案桌和一支蜡烛"
        - "沈娘子已经等在那里——坐在案桌旁，面前放着一卷泛黄的卷轴和一把小匕首"
      sensory_details:
        - "通道里没有灯光——只有最前方密室里的烛火指引方向"
        - "密室里有一股旧纸和墨的味道——像是很久没人来了"
        - "蜡烛的光很微弱——照亮了沈娘子的脸，也照亮了桌上那卷卷轴"
      npc_behavior_hints:
        - "杜若不会陪你下来——她在通道口等你"
        - "沈娘子会示意你坐下，然后展开卷轴——卷轴上写的是天道血誓的内容"
        - "她不会逼你——但立下血誓之前你还有选择的权利"
        - "立誓的方式是划破手指，将血滴在卷轴上的特制符文处"
        - "沈娘子全程面无表情——她只是见证，不是劝说"

  # ===== 场景四：结果宣布 =====
  result:
    scene_id: "result"
    name: "入门"
    description: "血誓完成。沈娘子收起卷轴，看了你一眼——那是她第一次真正地看了你一眼。她没有说话，但收起卷轴的动作比平时慢了一拍。等你回到三楼，杜若已经站在窗前等着你了。她没有回头，但你知道她在等你。她开口的时候，声音比之前轻了一些：'欢迎。'"
    mood: "尘埃落定、成为自己人"
    free_input_enabled: true
    agent_guidance:
      setting_details:
        - "回到三楼厢房时，窗外的夜景和之前一样——但你知道一切都不一样了"
        - "杜若站在窗口，背对着你——她不是在看风景，她是在给你空间"
      sensory_details:
        - "舫外的丝竹声还在响——和进来时听到的是同一首曲子，但心境完全不同"
        - "杜若的声音比之前轻了一些——那是她从'试探模式'切换到'自己人'模式的变化"
      npc_behavior_hints:
        - "杜若回头后会给你一块信物——一块看似普通的玉佩，实为身份标识"
        - "她会给你一个初步的身份安排——'以后你就是百花舫的人了。具体做什么——明天再说。'"
        - "她会告诉你一条应急联络方式——但不是全部"
        - "入门不是结束——真正的训练刚刚开始"

reward:
  cultivation_gain: 15
  add_items:
    - item_id: "low_grade_spirit_stone"
      quantity: 10
  set_flags:
    - "trial_completed"
    - "hongchen_disciple"
