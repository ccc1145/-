# 小事件：宗门小插曲
# 随机事件类——宗门内发生的意外小事
event_id: "sect_incident"
name: "宗门小插曲"
type: "minor"
difficulty: 2
tags: ["随机", "日常", "意外"]

trigger_conditions:
  - type: "flag_check"
    required_flags: ["trial_completed"]

free_narrative_hints:
  - "宗门内发生了一件意外的小事——某个弟子的灵兽跑出来了正在广场上撒欢、丹房传来一声闷响似乎炸炉了、有外宗访客提前到达正在山门口等待接待、膳堂今天的灵食出了点问题"
  - "这件事不算严重不会影响宗门运转，但打破了日常的平静，周围弟子都在议论或围观"
  - "玩家可以选择：上前帮忙（可能被当事方记住，获得一点好感）；在一旁看看热闹（获得一些情报或笑料）；绕道走开（什么都不会发生）"
  - "事件本身不产生持久影响，主要是给世界增加'活'的感觉"
  - "Agent 决定具体的事件内容（从 hints 中选取一个方向自行发挥），以及不同选择的直接结果"

scenes:
  entry:
    scene_id: "entry"
    name: "出事了"
    description: "你正走着，忽然听到前方传来一阵嘈杂声——有人在喊，有人在笑，还有几声不太对劲的闷响。几个弟子正朝那个方向跑去。"
    free_input_enabled: true
