  rarity: "uncommon"
  stackable: true
  max_stack: 5
  effects:
    - type: "boost_attribute"
      target: "perception"
      value: 25
      description: "提升监听能力，持续一个时辰"
  price: 80

- item_id: "mirage_pearl"
