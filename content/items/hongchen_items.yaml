# 物品配置：红尘阁特色物品
# 情报宗门——伪装工具、毒药、窃听道具、幻术媒介
- item_id: "disguise_mask"
  name: "易容面具"
  type: "equipment"
  description: "以灵蚕丝和特制胶质制成的面具，贴合面部后可改变容貌。精细程度一般，但足以骗过普通人的眼睛。红尘阁新人入门后配发。"
  rarity: "common"
  stackable: false
  effects:
    - type: "boost_attribute"
      target: "stealth"
      value: 10
      description: "提升伪装能力"
  price: 50

- item_id: "hongchen_heart_technique"
  name: "《红尘渡厄经》入门篇"
  type: "skill_book"
  description: "红尘阁核心功法的入门部分，以情入道、以欲为引，在七情六欲中保持本心。修炼此法需自行把控，沉沦者自生自灭。"
  rarity: "common"
  stackable: false
  effects:
    - type: "learn_skill"
      target: "hongchen_cultivation"
      value: 1
      description: "习得红尘阁基础修炼法门"
  price: 0

- item_id: "dream_incense"
  name: "迷梦香"
  type: "consumable"
  description: "一种无色无味的熏香，点燃后可使吸入者精神放松、防备降低，套话的绝佳辅助工具。对意志坚定者效果减半。"
  rarity: "uncommon"
  stackable: true
  max_stack: 10
  effects:
    - type: "boost_attribute"
      target: "charm"
      value: 15
      description: "使目标放松警惕，便于套取信息"
  price: 60

- item_id: "soft_tongue_powder"
