  rarity: "common"
  stackable: true
  max_stack: 10
  effects:
    - type: "boost_attribute"
      target: "speed"
      value: 20
      description: "短时间内大幅提升移动速度"
  price: 40

- item_id: "eavesdropping_talisman"
