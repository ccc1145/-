  type: "consumable"
  description: "一种混入酒水中的药粉，无色无味。服用者在药效期间会不自觉地多说真话，但对金丹期以上修士效果极弱。"
  rarity: "rare"
  stackable: true
  max_stack: 5
  effects:
    - type: "boost_attribute"
      target: "charm"
      value: 30
      description: "使目标难以说谎，持续一刻钟"
  price: 200

- item_id: "swift_step_token"
