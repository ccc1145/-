# 物品配置：扶龙宫特色物品
# 皇室学府——奢华资源、龙脉特产、策论典籍、礼仪器物
- item_id: "fulong_robe"
  name: "宫制锦袍"
  type: "equipment"
  description: "扶龙宫弟子制式锦袍，以金丝银线织就，领口绣有龙纹图案。布料中织入了龙脉灵气滋养过的灵蚕丝，穿着可小幅加速灵气运转。"
  rarity: "common"
  stackable: false
  effects:
    - type: "boost_attribute"
      target: "spirit_power"
      value: 8
      description: "略微提升灵气感应和运转速度"
  price: 200

- item_id: "huangji_jingdian_copy"
  name: "《皇极惊世典》基础篇抄本"
  type: "skill_book"
  description: "扶龙宫核心功法的入门部分，记载从炼气至筑基的基础修炼法门。外姓弟子可习得此卷，中卷以上仅宗室可学。"
  rarity: "common"
  stackable: false
  effects:
    - type: "learn_skill"
      target: "fulong_cultivation"
      value: 1
      description: "习得扶龙宫基础修炼法门"
  price: 0

- item_id: "dragon_vein_tea"
  name: "龙脉灵茶"
  type: "consumable"
  description: "以化龙池周围灵田种植的龙须茶叶泡制，茶汤呈淡金色。饮后灵气自丹田升腾，久久不散。宫中弟子每月限量配给。"
  rarity: "uncommon"
  stackable: true
  max_stack: 10
  effects:
    - type: "boost_cultivation"
      target: "player.cultivation"
      value: 35
      description: "饮用后灵气持续升腾，提升修炼效率"
  price: 80

- item_id: "dragon_pool_token"
  name: "化龙池令牌"
  type: "key_item"
  description: "进入化龙池的专用令牌，由宫主或皇帝亲赐。持令者可在限定时间内进入化龙池洗练灵根。非立大功者不可得。"
  rarity: "epic"
  stackable: false
  effects:
    - type: "boost_attribute"
      target: "spirit_power"
      value: 100
      description: "在化龙池中洗练可大幅提升灵根资质"
  price: 5000

- item_id: "golden_spirit_wine"
  name: "金桂灵酒"
  type: "consumable"
  description: "宫中御酿，以百年金桂和多种灵果酿制而成。酒液透亮如琥珀，饮后灵力充盈全身。非节庆日不得畅饮。"
  rarity: "uncommon"
  stackable: true
  max_stack: 5
  effects:
    - type: "restore_mp"
      value: 100
      description: "快速恢复大量灵力"
  price: 120

