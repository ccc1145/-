  type: "skill_book"
  description: "扶龙宫历代策论考题的精选汇编，附有教习点评。外宫弟子备考必备，但书上教的答题思路与实际朝堂的运转方式往往相去甚远。"
  rarity: "common"
  stackable: false
  effects:
    - type: "learn_skill"
      target: "fulong_strategy"
      value: 1
      description: "习得扶龙宫策论基本思路"
  price: 30

